name: encoder-ai-mcp
description: 'Encoder Ai tools for AI agents. Capabilities: encode base64, decode
  base64, encode url. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: encode_base64
  description: Encode text to Base64.
  parameters:
  - name: text
    type: string
    required: true
- name: decode_base64
  description: Decode Base64 to text.
  parameters:
  - name: encoded
    type: string
    required: true
- name: encode_url
  description: URL-encode a string.
  parameters:
  - name: text
    type: string
    required: true
- name: encode_html
  description: HTML-encode special characters.
  parameters:
  - name: text
    type: string
    required: true
- name: to_hex
  description: Convert text to hexadecimal.
  parameters:
  - name: text
    type: string
    required: true
